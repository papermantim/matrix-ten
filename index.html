<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root {
            --retro-bg: #EED7D8; 
            --panel-white: #F6F3EB;
            --tile-soft-yellow: #F2E5BF; 
            --accent-orange: #E9531D;
            --text-dark: #3D1B11;
            --border-3d-outset: 2px solid var(--text-dark);
            --box-shadow-3d: inset 2px 2px 0 rgba(255,255,255,0.7), 4px 4px 0 rgba(0,0,0,0.2);
            --box-shadow-btn: 3px 3px 0 rgba(0,0,0,0.3);
        }

        /* 关键：touch-action: none 防止浏览器默认的手势干扰（如滑动翻页） */
        * { outline: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; touch-action: none; }

        body { 
            background: var(--retro-bg); margin: 0; overflow: hidden; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; font-family: 'Courier New', Courier, monospace;
            user-select: none; color: var(--text-dark);
        }

        .screen { display: none; flex-direction: column; align-items: center; width: 100%; }
        .screen.active { display: flex; }

        #gameScreen.active { gap: 10px; } 

        .window {
            background: var(--panel-white);
            border: var(--border-3d-outset);
            box-shadow: var(--box-shadow-3d);
            border-radius: 4px;
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        .window-title {
            width: 100%; height: 28px; background: #CFC5C0; 
            border-bottom: var(--border-3d-outset);
            margin-bottom: 20px; padding: 0 10px;
            display: flex; align-items: center; justify-content: space-between;
            font-weight: bold; letter-spacing: 1px; font-size: 14px;
        }
        .window-controls { display: flex; gap: 4px; }
        .win-btn { width: 16px; height: 16px; border: 1px solid var(--text-dark); border-radius: 50%; }

        h1 { font-size: 2.2rem; letter-spacing: 2px; margin: 10px 0 25px; text-transform: uppercase; font-weight: bold;}
        
        .btn {
            background: #E0E0D8; border: var(--border-3d-outset); color: var(--text-dark);
            padding: 12px 0; font-size: 1rem; cursor: pointer; margin: 6px;
            transition: all 0.1s; border-radius: 2px; letter-spacing: 1px; font-family: inherit; font-weight: bold;
            box-shadow: var(--box-shadow-btn);
            min-width: 240px;
            text-align: center;
        }
        .btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 rgba(0,0,0,0.3); }

        .audio-settings-row {
            margin-top: 30px; padding: 15px 15px; width: 90%;
            display: flex; flex-direction: row; align-items: center; justify-content: center;
            gap: 25px; border-top: 2px dashed #B3B1AD;
        }
        
        .setting-control { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 900; color: var(--text-dark); letter-spacing: 0.5px; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; margin: 0; }
        input[type="range"] { width: 110px; accent-color: var(--accent-orange); cursor: pointer; height: 5px; }

        /* 游戏界面缩放：保持你的 0.85 缩放，这很适合 iPad 横屏 */
        #gameScreen .window { transform: scale(0.85); transform-origin: center center; margin: -25px 0; }
        .game-header { width: 1180px; padding: 10px; }
        .grid-window { padding: 5px; }

        .progress-container { width: 100%; height: 8px; background: #CCC5C0; border: 1px solid var(--text-dark); border-radius: 4px; overflow: hidden; position: relative; }
        #progressBar { width: 0%; height: 100%; background: var(--accent-orange); transition: width 0.1s linear; }

        .grid {
            display: grid; grid-template-columns: repeat(18, 60px); grid-template-rows: repeat(10, 60px);
            gap: 6px; position: relative; padding: 10px; cursor: crosshair;
        }

        .tile {
            width: 60px; height: 60px; background: var(--tile-soft-yellow); 
            color: var(--text-dark); display: flex; justify-content: center; align-items: center;
            font-size: 28px; border: 2px solid var(--text-dark); border-radius: 3px; pointer-events: none;
            font-weight: 800; transition: transform 0.1s ease, background 0.1s ease;
        }

        .tile.highlight { background: var(--accent-orange); color: white; border-color: #A03913; transform: scale(1.05) rotate(3deg); z-index: 2; }
        .tile.removed { animation: shrink-away 0.3s forwards; pointer-events: none; }
        @keyframes shrink-away { 0% { transform: scale(1) rotate(3deg); opacity: 1; } 100% { transform: scale(0) rotate(20deg); opacity: 0; } }

        #selectionBox { position: absolute; border: 2px solid var(--accent-orange); background: rgba(233, 83, 29, 0.1); pointer-events: none; display: none; z-index: 10; }
    </style>
</head>
<body>

    <div id="startScreen" class="screen active">
        <div class="window" style="padding: 0 0 10px; width: 520px;">
            <div class="window-title">SYSTEM_LOGIN <div class="window-controls"><div class="win-btn" style="background:#5B5B5A"></div><div class="win-btn" style="background:#B3B1AD"></div></div></div>
            <h1>MATRIX TEN</h1>
            <button class="btn" onclick="startGame(1)">SIMPLE MODE</button>
            <button class="btn" onclick="startGame(2)">NORMAL MODE</button>
            <button class="btn" onclick="startGame(3)">HARD MODE</button>
            <div class="audio-settings-row">
                <div class="setting-control"><input type="checkbox" id="bgmToggle" checked onchange="toggleBGM()"><label for="bgmToggle" style="cursor: pointer;">ENABLE BGM</label></div>
                <div class="setting-control"><span>VOLUME:</span><input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5" oninput="updateVolume()"></div>
            </div>
        </div>
    </div>

    <div id="gameScreen" class="screen">
        <div class="game-header window" style="align-items: stretch;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 1.1rem; letter-spacing: 1px; font-weight: bold;">
                <span id="scoreDisplay">SCORE: 0</span>
                <span id="levelDisplay" style="color: var(--accent-orange);">NORMAL MODE</span>
            </div>
            <div class="progress-container"><div id="progressBar"></div></div>
        </div>
        <div class="window grid-window">
            <div class="grid" id="gameGrid"><div id="selectionBox"></div></div>
        </div>
    </div>

    <div id="endScreen" class="screen">
        <div class="window" style="padding: 0 0 40px; width: 500px; text-align: center;">
            <div class="window-title">SESSION_REPORT <div class="window-controls"><div class="win-btn" style="background:var(--accent-orange)"></div><div class="win-btn" style="background:#B3B1AD"></div></div></div>
            <h2 style="color: var(--accent-orange); text-transform: uppercase; margin-top: 20px; font-weight: bold;">SESSION COMPLETED</h2>
            <div style="font-size: 5rem; margin: 10px 0; font-weight: bold;" id="finalScore">0</div>
            <div id="finalLevelDesc" style="color: #666; margin-bottom: 30px; letter-spacing: 1px; font-weight: bold;"></div>
            <button class="btn" onclick="location.reload()">RESTART</button>
        </div>
    </div>

<script>
    const sounds = {
        menu: new Audio('01.wav'), game: new Audio('02.mp3'), click: new Audio('03.mp3'), clear: new Audio('04.mp3'), end: new Audio('05.wav')
    };
    sounds.menu.loop = true; sounds.game.loop = true;

    let isBGMEnabled = true, currentVolume = 0.5, score = 0, level = 1, timeLeft = 0, isDragging = false, startX, startY, tiles = [], timer = null;
    const modeNames = ["", "SIMPLE MODE", "NORMAL MODE", "HARD MODE"];

    function updateVolume() { currentVolume = document.getElementById('volumeSlider').value; Object.values(sounds).forEach(s => s.volume = currentVolume); }
    function toggleBGM() { isBGMEnabled = document.getElementById('bgmToggle').checked; if (!isBGMEnabled) Object.values(sounds).forEach(s=>s.pause()); else if(document.getElementById('startScreen').classList.contains('active')) sounds.menu.play().catch(()=>{}); }

    // 适配 iPad 的交互逻辑
    const grid = document.getElementById('gameGrid');
    const selBox = () => document.getElementById('selectionBox'); 

    // 辅助函数：统一获取鼠标或手指的坐标
    function getEventPos(e) {
        const rect = grid.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: (clientX - rect.left) / 0.85, 
            y: (clientY - rect.top) / 0.85
        };
    }

    function handleStart(e) {
        if (e.target.closest('.btn')) return;
        isDragging = true;
        sounds.click.currentTime = 0; sounds.click.play().catch(()=>{});
        const pos = getEventPos(e);
        startX = pos.x; startY = pos.y;
        selBox().style.display = 'block';
    }

    function handleMove(e) {
        if (!isDragging) return;
        if (e.cancelable) e.preventDefault(); // 防止 iPad 滚动页面
        const pos = getEventPos(e);
        let x = Math.min(startX, pos.x), y = Math.min(startY, pos.y), w = Math.abs(startX - pos.x), h = Math.abs(startY - pos.y);
        const box = selBox();
        box.style.left = x + 'px'; box.style.top = y + 'px'; box.style.width = w + 'px'; box.style.height = h + 'px';
        tiles.forEach(t => {
            if (t.removed) return;
            const inBox = !(t.el.offsetLeft > x + w || t.el.offsetLeft + 60 < x || t.el.offsetTop > y + h || t.el.offsetTop + 60 < y);
            t.el.classList.toggle('highlight', inBox);
        });
    }

    function handleEnd() {
        if (!isDragging) return;
        isDragging = false; selBox().style.display = 'none';
        const selected = tiles.filter(t => t.el.classList.contains('highlight'));
        const sum = selected.reduce((acc, t) => acc + t.val, 0);
        if (sum === 10 && selected.length > 0) {
            sounds.clear.currentTime = 0; sounds.clear.play().catch(()=>{});
            selected.forEach(t => { t.removed = true; t.el.classList.add('removed'); });
            score += selected.length * 10;
            document.getElementById('scoreDisplay').innerText = `SCORE: ${score}`;
        }
        tiles.forEach(t => t.el.classList.remove('highlight'));
    }

    // 绑定鼠标和触控事件
    grid.addEventListener('mousedown', handleStart);
    window.addEventListener('mousemove', handleMove, { passive: false });
    window.addEventListener('mouseup', handleEnd);

    grid.addEventListener('touchstart', handleStart, { passive: false });
    window.addEventListener('touchmove', handleMove, { passive: false });
    window.addEventListener('touchend', handleEnd);

    // 其余游戏逻辑保持不变
    function startGame(lv) {
        level = lv; sounds.menu.pause();
        if (isBGMEnabled) { sounds.game.currentTime = 0; sounds.game.play().catch(()=>{}); }
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('gameScreen').classList.add('active');
        document.getElementById('levelDisplay').innerText = modeNames[lv];
        initGrid(); startTimer();
    }

    function initGrid() {
    const gridEl = document.getElementById('gameGrid');
    gridEl.innerHTML = '<div id="selectionBox"></div>'; 
    tiles = [];

    // 目标总和
    const targetSum = level === 1 ? 750 : (level === 2 ? 800 : 850);
    const totalTiles = 180;
    const nums = [];

    // 1. 先按平均生成所有数字，确保差值可控
    let currentSum = 0;
    for (let i = 0; i < totalTiles; i++) {
        // 先给一个接近平均值的数，减少后续调整压力
        const avg = targetSum / totalTiles;
        const val = Math.floor(Math.random() * 5) + Math.floor(avg) - 1;
        const safeVal = Math.max(1, Math.min(9, val));
        nums.push(safeVal);
        currentSum += safeVal;
    }

    let diff = targetSum - currentSum;

    // 2. 分阶段调整，避免循环卡死
    // 优先调整非边界的数字，保证每次都能有效缩小差值
    while (diff !== 0) {
        let adjusted = false;
        for (let i = 0; i < totalTiles; i++) {
            const cur = nums[i];
            if (diff > 0 && cur < 9) {
                nums[i]++;
                diff--;
                adjusted = true;
                break;
            } else if (diff < 0 && cur > 1) {
                nums[i]--;
                diff++;
                adjusted = true;
                break;
            }
        }
        // 如果没调整到，说明大部分数字都到边界了，强制从非边界调整
        if (!adjusted) {
            if (diff > 0) {
                // 强制找一个不是9的数加1
                for (let i = 0; i < totalTiles; i++) {
                    if (nums[i] < 9) {
                        nums[i]++;
                        diff--;
                        break;
                    }
                }
            } else {
                // 强制找一个不是1的数减1
                for (let i = 0; i < totalTiles; i++) {
                    if (nums[i] > 1) {
                        nums[i]--;
                        diff++;
                        break;
                    }
                }
            }
        }
    }

    // 3. 打乱顺序，让数字分布更自然
    for (let i = nums.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [nums[i], nums[j]] = [nums[j], nums[i]];
    }

    // 4. 渲染到页面
    for (const val of nums) {
        const el = document.createElement('div');
        el.className = 'tile';
        el.innerText = val;
        gridEl.appendChild(el);
        tiles.push({ el, val, removed: false });
    }
}

    function startTimer() {
        if(timer) clearInterval(timer);
        timer = setInterval(() => {
            timeLeft += 0.1;
            document.getElementById('progressBar').style.width = (timeLeft / 120) * 100 + '%';
            if (timeLeft >= 120) { clearInterval(timer); showEnd(); }
        }, 100);
    }

    function showEnd() {
        sounds.game.pause();
        if (isBGMEnabled) sounds.end.play().catch(()=>{});
        document.getElementById('gameScreen').classList.remove('active');
        document.getElementById('endScreen').classList.add('active');
        document.getElementById('finalScore').innerText = score;
        document.getElementById('finalLevelDesc').innerText = modeNames[level];
    }

    updateVolume();
    document.body.addEventListener('touchstart', () => {
        if (isBGMEnabled && document.getElementById('startScreen').classList.contains('active')) sounds.menu.play().catch(()=>{});
    }, { once: true });
</script>
</body>
</html>
